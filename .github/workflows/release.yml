name: Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes (use \\n for new lines)"
        required: true
        type: string
      version_override:
        description: "Custom version (e.g. 2.0.0). Leave empty to auto-increment patch."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch current latest version from GitHub releases
          CURRENT=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null) || CURRENT="v0.0.0"
          CURRENT="${CURRENT#v}"
          echo "Current version: $CURRENT"

          OVERRIDE="${{ inputs.version_override }}"
          if [ -n "$OVERRIDE" ]; then
            OVERRIDE="${OVERRIDE#v}"
            NEW_VERSION="$OVERRIDE"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}

            if [ "$CURRENT" = "0.0.0" ]; then
              NEW_VERSION="1.0.0"
            else
              PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Read .NET SDK version
        id: dotnet-version
        shell: bash
        run: |
          SDK_VERSION=$(jq -r '.sdk.version' global.json)
          echo "sdk-version=$SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "SDK version: $SDK_VERSION"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.dotnet-version.outputs.sdk-version }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Publish Self-Contained (win-x64)
        run: |
          msbuild src/SIV.App/SIV.App.csproj `
            /restore `
            /t:Publish `
            /p:PublishProfile=Release-x64-SelfContained `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:PublishDir=${{ github.workspace }}\publish\self-contained\

      - name: Publish Framework-Dependent (win-x64)
        run: |
          msbuild src/SIV.App/SIV.App.csproj `
            /restore `
            /t:Publish `
            /p:PublishProfile=Release-x64-FrameworkDependent `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:PublishDir=${{ github.workspace }}\publish\framework-dependent\

      - name: Publish Updater (win-x64)
        run: |
          dotnet publish src/SIV.Updater/SIV.Updater.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -o publish/updater

      - name: Publish Launcher (win-x64)
        run: |
          dotnet publish src/SIV.Launcher/SIV.Launcher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -o publish/launcher

      - name: Assemble release folders
        shell: bash
        run: |
          for VARIANT in self-contained framework-dependent; do
            STAGE="publish/release-${VARIANT}"
            mkdir -p "${STAGE}/runtime/updater"

            # Move all app files into runtime/
            cp -r publish/${VARIANT}/* "${STAGE}/runtime/"

            # Place updater inside runtime/updater/
            cp publish/updater/SIV.Updater.exe "${STAGE}/runtime/updater/"

            # Place launcher (SIV.exe) at root
            cp publish/launcher/SIV.exe "${STAGE}/"
          done

      - name: Create ZIP archives
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p artifacts

          cd publish/release-self-contained
          7z a -tzip "../../artifacts/SIV-v${VERSION}-win-x64-self-contained.zip" .
          cd ../..

          cd publish/release-framework-dependent
          7z a -tzip "../../artifacts/SIV-v${VERSION}-win-x64-framework-dependent.zip" .
          cd ../..

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          printf '%b' "$RELEASE_NOTES" > release_notes.md

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes-file release_notes.md \
            --latest \
            artifacts/SIV-v${VERSION}-win-x64-self-contained.zip \
            artifacts/SIV-v${VERSION}-win-x64-framework-dependent.zip

      - name: Update latest tag
        shell: bash
        run: |
          # Delete remote 'latest' tag if it exists (ignore errors if it doesn't)
          git push origin :refs/tags/latest 2>/dev/null || true

          # Delete local 'latest' tag if it exists
          git tag -d latest 2>/dev/null || true

          # Create new 'latest' tag at current commit
          git tag latest

          # Push the new 'latest' tag
          git push origin latest
